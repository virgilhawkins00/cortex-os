services:
  # ── Message Bus ──────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: cortex_nats
    ports:
      - "4222:4222"
      - "8222:8222"
      - "4223:4223"
    command: ["--auth", "${NATS_AUTH_TOKEN}"]
    networks:
      - cortex_net
    restart: always

  # ── Local LLM (Uncensored) ──────────
  ollama:
    image: ollama/ollama:latest
    container_name: cortex_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - cortex_net
    restart: always

  # ── Vector Database ─────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: cortex_chromadb
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    networks:
      - cortex_net
    restart: always

  # ── Memory & Brain Service (Python) ─
  cortex-memory:
    build:
      context: ./cortex-memory
      dockerfile: Dockerfile
    container_name: cortex_memory
    volumes:
      - memory_data:/app/data
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_AUTH_TOKEN=${NATS_AUTH_TOKEN}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-dolphin-mistral:latest}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CORTEX_MEMORY_DB_PATH=/app/data/cortex.db
    depends_on:
      - nats
      - chromadb
      - ollama
    networks:
      - cortex_net
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  memory_data:

networks:
  cortex_net:
    driver: bridge
