name: Cortex OS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint & Check ──────────────────────────────────────────
  check:
    name: Cargo Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings
      
      - name: Cargo check
        run: cargo check --workspace

  # ── Test ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test --workspace --no-fail-fast

  # ── Python Tests ──────────────────────────────────────────
  test-python:
    name: Python Memory Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          cd cortex-memory
          pip install -e ".[test]" 2>/dev/null || pip install -e . || true
          pip install pytest
      
      - name: Run Python tests
        run: |
          cd cortex-memory
          python -m pytest tests/ -v --tb=short || true

  # ── Build Release Binaries ───────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [test, test-python]
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cortex-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cortex-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: cortex-macos-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      
      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }}
      
      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cortex dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/cortex-tui dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/cortex-gateway dist/ 2>/dev/null || true
          cp -r agents dist/
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.tar.gz

  # ── Docker Image ─────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
